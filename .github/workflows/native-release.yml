name: Native Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: Native wrapper target
        required: true
        type: choice
        options:
          - capacitor
          - tauri
          - electron
      profile:
        description: Signing profile
        required: true
        type: choice
        options:
          - android
          - ios
          - macos
          - windows
          - tauri-update

permissions:
  contents: read

jobs:
  native-release-contract:
    name: Native release contract
    runs-on: ${{ inputs.profile == 'windows' && 'windows-latest' || inputs.profile == 'ios' && 'macos-latest' || inputs.profile == 'macos' && 'macos-latest' || 'ubuntu-latest' }}
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_NOTARIZATION_USERNAME: ${{ secrets.APPLE_NOTARIZATION_USERNAME }}
      APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate native signing environment
        run: npm run package:native:check -- --strict --target ${{ inputs.target }} --profile ${{ inputs.profile }}

      - name: Materialize signing files
        run: npm run package:native:materialize -- --clean --target ${{ inputs.target }} --profile ${{ inputs.profile }}

      - name: Build Web/PWA bundle
        run: npm run build

      - name: Generate native shell scaffold
        run: npm run package:scaffold -- --force

      - name: Upload native scaffold artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ inputs.target }}-${{ inputs.profile }}-scaffold
          path: .package-scaffold/

      - name: Remove materialized signing files
        if: always()
        shell: bash
        run: rm -rf .native-release
