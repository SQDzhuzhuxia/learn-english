name: Native Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: Native wrapper target
        required: true
        type: choice
        options:
          - capacitor
          - tauri
          - electron
      profile:
        description: Signing profile
        required: true
        type: choice
        options:
          - android
          - android-store
          - ios
          - macos
          - windows
          - windows-store
          - tauri-update
      web_url:
        description: Deployed Web/PWA URL that native shells should wrap
        required: true
        type: string
      submit_to_store:
        description: Run the native store submission command after preflight
        required: false
        default: false
        type: boolean
      store_artifact_path:
        description: Path to the signed package to submit, when the store profile requires one
        required: false
        type: string
      store_track:
        description: Store track or channel, such as Google Play internal
        required: false
        default: internal
        type: string
      commit_store_submission:
        description: Commit the store submission when the store CLI supports drafts
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  native-release-contract:
    name: Native release contract
    runs-on: ${{ inputs.profile == 'windows' && 'windows-latest' || inputs.profile == 'windows-store' && 'windows-latest' || inputs.profile == 'ios' && 'macos-latest' || inputs.profile == 'macos' && 'macos-latest' || 'ubuntu-latest' }}
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
      GOOGLE_PLAY_PACKAGE_NAME: ${{ secrets.GOOGLE_PLAY_PACKAGE_NAME }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_NOTARIZATION_USERNAME: ${{ secrets.APPLE_NOTARIZATION_USERNAME }}
      APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      MICROSOFT_STORE_TENANT_ID: ${{ secrets.MICROSOFT_STORE_TENANT_ID }}
      MICROSOFT_STORE_CLIENT_ID: ${{ secrets.MICROSOFT_STORE_CLIENT_ID }}
      MICROSOFT_STORE_CLIENT_SECRET: ${{ secrets.MICROSOFT_STORE_CLIENT_SECRET }}
      MICROSOFT_STORE_SELLER_ID: ${{ secrets.MICROSOFT_STORE_SELLER_ID }}
      MICROSOFT_STORE_PRODUCT_ID: ${{ secrets.MICROSOFT_STORE_PRODUCT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate native signing environment
        run: npm run package:native:check -- --strict --target ${{ inputs.target }} --profile ${{ inputs.profile }}

      - name: Materialize signing files
        run: npm run package:native:materialize -- --clean --target ${{ inputs.target }} --profile ${{ inputs.profile }}

      - name: Build Web/PWA bundle
        run: npm run build

      - name: Generate native shell scaffold
        run: npm run package:scaffold -- --force

      - name: Prepare deployed Web/PWA wrapper
        run: npm run package:native:prepare -- --clean --target "${{ inputs.target }}" --profile "${{ inputs.profile }}" --web-url "${{ inputs.web_url }}"

      - name: Install Google Play publisher
        if: ${{ inputs.profile == 'android-store' && inputs.submit_to_store == true }}
        run: gem install fastlane

      - name: Install Microsoft Store Developer CLI
        if: ${{ inputs.profile == 'windows-store' && inputs.submit_to_store == true }}
        uses: microsoft/microsoft-store-apppublisher@v1.1

      - name: Preflight native store submission
        if: ${{ inputs.profile == 'android-store' || inputs.profile == 'ios' || inputs.profile == 'macos' || inputs.profile == 'windows-store' }}
        run: npm run release:native:store -- --dry-run --target "${{ inputs.target }}" --profile "${{ inputs.profile }}" --web-url "${{ inputs.web_url }}" --artifact "${{ inputs.store_artifact_path }}" --track "${{ inputs.store_track }}"

      - name: Submit native release to store
        if: ${{ inputs.submit_to_store == true && (inputs.profile == 'android-store' || inputs.profile == 'ios' || inputs.profile == 'macos' || inputs.profile == 'windows-store') }}
        run: npm run release:native:store -- --target "${{ inputs.target }}" --profile "${{ inputs.profile }}" --web-url "${{ inputs.web_url }}" --artifact "${{ inputs.store_artifact_path }}" --track "${{ inputs.store_track }}" ${{ inputs.commit_store_submission == true && '--commit' || '' }}

      - name: Upload native scaffold artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ inputs.target }}-${{ inputs.profile }}-release-inputs
          path: |
            .package-scaffold/
            .native-release/wrapper/

      - name: Remove materialized signing files
        if: always()
        shell: bash
        run: rm -rf .native-release
